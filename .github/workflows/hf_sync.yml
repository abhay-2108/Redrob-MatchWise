name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space https://raj0120:$HF_TOKEN@huggingface.co/spaces/raj0120/redrob-matchwise
          # Push LFS objects to HF Spaces (supports LFS for binary files)
          git lfs push --all space
          # Push git refs (including LFS pointer files)
          git push --force space main
