name: Build & Deploy to HF Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Log in to Hugging Face Container Registry
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: docker login -u raj0120 --password-stdin registry.hf.space <<< "$HF_TOKEN"

      - name: Build and push Docker image
        run: |
          docker build \
            -t registry.hf.space/raj0120/redrob-matchwise:latest \
            -t registry.hf.space/raj0120/redrob-matchwise:${{ github.sha }} \
            .
          docker push --all-tags registry.hf.space/raj0120/redrob-matchwise
