name: Keep Deployed Streamlit App Awake

on:
  schedule:
    # Runs at 00:00 UTC every 1 days to reset the 7-day sleep timer
    - cron: '0 0 */1 * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          curl -I -s https://redrob-matchwise.streamlit.app/ | head -n 1
