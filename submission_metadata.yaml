# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  An ultra-efficient, non-linear candidate matching system (The Singularity Engine)
  designed to match candidates to the Job Description with zero keyword-trap vulnerability:
  1. Score = (ATD ^ 1.5) * HEA, implementing non-linear scaling where Axis A is
     Absolute Technical Dominance (ATD) and Axis B is High Execution Agency (HEA).
  2. ATD is computed via a hardcoded hierarchical 4-level AI taxonomy (Core, Applied
     SOTA, Standard AI, Wrappers) matching skills and career description keywords,
     with breadth/depth bonuses and a CV/speech-only penalty.
  3. HEA is a multiplicative modifier compiled from 14 behavioral/career signals:
     title fit, experience sweet spot, github activity, startup survival, product DNA,
     active recency, notice period, responsiveness, relocate willingness, etc.
  4. Three hard filters: Anomalous honeypots (pre-computed), service-only career
     histories, and unrelated titles lacking technical history.
  5. Pre-computed high-quality LLM-generated reasonings for the top candidates.
  Runs in ~20 seconds for 100K candidates on CPU.

