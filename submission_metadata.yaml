ai_usage_summary: |
  No AI tools were used during ranking inference. All ranking is done offline
  with precomputed features and trained models on CPU with no network access.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Our system uses a 4-stage CPU-only pipeline: (1) hard filters remove honeypots,
  service-only, ghost, and zero-skill profiles; (2) XGBoost LambdaMART + LightGBM
  ensemble scores remaining ~40K candidates; (3) FlashRank cross-encoder reranks
  top 50 against the JD; (4) weighted fusion (40% XGBoost + 20% FlashRank + 40%
  heuristic singularity_score) produces the final top 100. The heuristic component
  uses the ATD^1.5 × HEA formula to ensure deep technical skills dominate over
  keyword stuffing. Total runtime: ~6 seconds on CPU.

