ai_usage_summary: |
  Used Claude and Gemini for architecture design, code review, speed benchmarking,
  and iterative refinement of the scoring heuristics. No candidate data was
  sent to any external LLM during the ranking phase.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A 4-layer hybrid ranking system matching candidates to the Job Description:
  1. Semantic similarity via L2-normalized sentence embeddings (all-MiniLM-L6-v2),
     pre-computed for viable profiles with lazy on-the-fly fallback (30%).
  2. Keyword relevance using BM25 Okapi search over candidate profiles (25%).
  3. Five-component heuristics: title fit, experience band, weighted skills
     depth (with endorsement/duration multipliers), and location fit (25%).
  4. Behavioral availability modifier (notice period, active recency, response (20%).
  Honeypots pre-filtered via calendar/tenure anomalies. Dynamic reasoning generated
  deterministically using profile facts and hash-based variations.
  Runs in ~23 seconds for 100K candidates on CPU.

